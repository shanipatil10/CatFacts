<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Explorer</title>
    <link rel="stylesheet" href="foodfact.css">
</head>
<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="container">

        <h1>🍔 Food Explorer</h1>
        <p class="subtitle">Discover foods from around the world</p>

        <div class="glass-card">

            <div class="img-container">
                <img id="foodImg" alt="Food Product">
            </div>

            <div class="food-info">

                <h2 id="foodName">
                    Click Generate
                </h2>

                <div class="info-box">
                    <span>🏷 Brand</span>
                    <span id="brand">-</span>
                </div>

                <div class="info-box">
                    <span>🥗 Nutrition Grade</span>
                    <span id="grade">-</span>
                </div>

                <div class="info-box">
                    <span>🌍 Country</span>
                    <span id="country">-</span>
                </div>

                <div class="ingredients-box">
                    <h3>Ingredients</h3>
                    <p id="ingredients">
                        Click generate to load food information.
                    </p>
                </div>

            </div>

            <button id="generateBtn">
                Generate Food
            </button>

        </div>

    </div>

    <script src="foodfact.js"></script>
</body>
</html>
